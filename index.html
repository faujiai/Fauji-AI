<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,interactive-widget=resizes-content">
<title>FAUJI AI - Bhartiya Sena Ka AI Assistant</title>
<meta name="description" content="FAUJI AI - Indian Army AI Assistant">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#d4a017;--g2:#f0c040;--gr:#7ab840;--r:#cc2200;--t:#e8ddb8;--m:#7a7a5a;--d:#0d1105}
html,body{height:100%;overflow:hidden}
body{height:100dvh;font-family:Arial,sans-serif;background:var(--d);color:var(--t);display:flex;flex-direction:column}
.tri{height:5px;background:linear-gradient(90deg,#FF9933 33%,#fff 33% 66%,#138808 66%);width:100%;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.5)}50%{box-shadow:0 0 0 14px rgba(212,160,23,0)}}
@keyframes glow{0%,100%{text-shadow:0 0 18px rgba(212,160,23,.6)}50%{text-shadow:0 0 40px rgba(212,160,23,1)}}
@keyframes blink2{50%{opacity:.15}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dp{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}
#splash{position:fixed;inset:0;z-index:9999;background:var(--d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden;transition:opacity .4s}
.sp-star{position:absolute;border-radius:50%;animation:blink2 2s infinite}
header{position:relative;z-index:10;background:linear-gradient(180deg,rgba(16,22,4,1),rgba(10,14,3,.98));border-bottom:3px solid var(--g);flex-shrink:0}
.hdr{display:flex;align-items:center;gap:10px;padding:8px 12px 10px;position:relative}
.chakra svg{display:block;flex-shrink:0;animation:spin 14s linear infinite;filter:drop-shadow(0 0 14px rgba(212,160,23,.75))}
.htxt{flex:1;min-width:0}
.htitle{font-size:24px;font-weight:900;letter-spacing:5px;color:var(--g2);animation:glow 3s ease-in-out infinite}
.hsub{font-size:8px;letter-spacing:2px;color:#b8985a;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.jh{font-size:12px;font-weight:900;letter-spacing:2px;color:#ff3300;animation:blink2 2s step-end infinite;white-space:nowrap}
.wa{padding:5px 10px;background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.6);border-radius:20px;color:#25d366;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap}
.cr{position:absolute;bottom:3px;right:10px;font-size:7px;color:rgba(196,169,106,.35)}
.modebar{display:flex;gap:6px;padding:6px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(212,160,23,.2);flex-shrink:0;overflow-x:auto}
.modebar::-webkit-scrollbar{display:none}
.mbtn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(212,160,23,.3);background:rgba(212,160,23,.08);color:#b8985a;white-space:nowrap;font-family:Arial}
.mbtn.active{background:rgba(212,160,23,.25);border-color:var(--g);color:var(--g2)}
#chat{flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;position:relative;z-index:1;min-height:0;height:0}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:rgba(90,120,40,.5);border-radius:3px}
#boot{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px;flex:1;width:100%;min-height:100%}
.msg{display:flex;gap:8px;width:100%;animation:mIn .25s ease}
.msg.u{flex-direction:row-reverse}
.av{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;clip-path:polygon(15% 0%,85% 0%,100% 15%,100% 85%,85% 100%,15% 100%,0% 85%,0% 15%);align-self:flex-end}
.msg.u .av{background:linear-gradient(135deg,#3a5018,#2a3c10);color:var(--g2)}
.msg.a .av{background:linear-gradient(135deg,#1a2c06,#102002);color:var(--gr)}
.bw{display:flex;flex-direction:column;max-width:83%}
.msg.u .bw{align-items:flex-end}
.msg.a .bw{align-items:flex-start}
.bub{padding:11px 15px;font-size:14px;line-height:1.9;word-break:break-word;position:relative}
.bub strong{font-weight:700;color:var(--g2)}
.bub em{font-style:italic;color:#c8e8a0}
.bub h1,.bub h2,.bub h3{color:var(--g2);font-weight:700;margin:8px 0 4px;font-size:15px}
.bub ul,.bub ol{padding-left:18px;margin:4px 0}
.bub li{margin:3px 0}
.bub table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.bub th{background:rgba(212,160,23,.2);color:var(--g2);padding:6px 8px;border:1px solid rgba(212,160,23,.3);text-align:left}
.bub td{padding:5px 8px;border:1px solid rgba(90,120,40,.3)}
.bub code{background:rgba(0,0,0,.4);border:1px solid rgba(122,184,64,.3);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:13px;color:#7ab840}
.msg.u .bub{background:linear-gradient(135deg,rgba(70,95,25,.65),rgba(50,68,15,.55));border:1px solid rgba(140,180,50,.4);border-radius:16px 2px 16px 16px;white-space:pre-wrap}
.msg.a .bub{background:linear-gradient(135deg,rgba(24,38,8,.9),rgba(14,22,4,.8));border:1px solid rgba(90,140,40,.45);border-radius:2px 16px 16px 16px}
.msg.u .bub::before,.msg.u .bub::after,.msg.a .bub::before,.msg.a .bub::after{content:"";position:absolute;width:9px;height:9px}
.msg.u .bub::before{top:-2px;right:-2px;border-top:2px solid var(--g2);border-right:2px solid var(--g2)}
.msg.u .bub::after{bottom:-2px;left:-2px;border-bottom:2px solid var(--g2);border-left:2px solid var(--g2)}
.msg.a .bub::before{top:-2px;left:-2px;border-top:2px solid var(--gr);border-left:2px solid var(--gr)}
.msg.a .bub::after{bottom:-2px;right:-2px;border-bottom:2px solid var(--gr);border-right:2px solid var(--gr)}
.uimg{max-width:180px;max-height:180px;border-radius:8px;display:block;margin-bottom:6px}
.ab{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ab button{background:rgba(60,80,20,.4);border:1px solid rgba(90,120,40,.4);border-radius:10px;color:var(--m);font-size:11px;padding:3px 10px;cursor:pointer;font-family:Arial}
.ab button:hover,.ab button:active{background:rgba(212,160,23,.15);border-color:var(--g);color:var(--g2)}
.bt{font-size:9px;color:var(--m);margin-top:3px;padding:0 3px}
.sc{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.sc a{font-size:10px;padding:2px 8px;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:10px;color:var(--g2);text-decoration:none;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sugg-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sugg-btn{padding:6px 12px;background:rgba(122,184,64,.1);border:1px solid rgba(122,184,64,.4);border-radius:16px;color:var(--gr);font-size:12px;cursor:pointer;font-family:Arial;text-align:left}
.sugg-btn:active{background:rgba(122,184,64,.2)}
.sc2{animation:blink2 .7s step-end infinite;color:var(--gr)}
.typing .bub{padding:12px 16px}
.td{width:10px;height:10px;background:var(--gr);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);opacity:.2;animation:dp 1.2s ease-in-out infinite;display:inline-block;margin:2px}
.td:nth-child(2){animation-delay:.2s;background:var(--g2)}
.td:nth-child(3){animation-delay:.4s;background:#ff6600}
.err{color:#ff7070!important;border-color:rgba(200,30,0,.4)!important;background:rgba(160,20,0,.15)!important}
.izone{position:relative;z-index:10;background:linear-gradient(180deg,rgba(12,16,4,.98),rgba(8,12,2,1));border-top:2px solid var(--g);padding:8px 12px 10px;flex-shrink:0}
#pw{display:none;position:relative;width:fit-content;margin-bottom:6px}
#pw img{max-height:60px;border-radius:7px;border:1px solid var(--g)}
.ri{position:absolute;top:-6px;right:-6px;width:17px;height:17px;border-radius:50%;background:var(--r);color:#fff;font-size:10px;border:none;cursor:pointer}
.irow{display:flex;gap:6px;align-items:flex-end}
.ibox{flex:1;background:rgba(28,40,10,.6);border:1.5px solid rgba(60,80,20,.7);border-radius:12px;padding:7px 10px;display:flex;align-items:flex-end;gap:6px}
.ibox:focus-within{border-color:var(--g)}
.att{background:none;border:none;color:var(--g2);font-size:19px;cursor:pointer;flex-shrink:0;padding:0;line-height:1}
#mi{flex:1;background:transparent;border:none;outline:none;color:var(--t);font-family:Arial,sans-serif;font-size:15px;resize:none;min-height:22px;max-height:110px;overflow-y:auto;line-height:1.5}
#mi::placeholder{color:var(--m);font-style:italic;font-size:14px}
.nl-btn{background:rgba(212,160,23,.2);border:1.5px solid rgba(212,160,23,.5);border-radius:8px;color:var(--g2);font-size:18px;cursor:pointer;flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700}
#vbtn{background:none;border:1px solid rgba(122,184,64,.35);border-radius:50%;color:var(--gr);font-size:17px;cursor:pointer;flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
#vbtn.on{color:#fff;background:#ff2020;border-color:#ff2020}
#sb{width:42px;height:42px;background:linear-gradient(135deg,#3a5018,#5a8a2a);border:1.5px solid var(--g);border-radius:10px;color:var(--g2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sb:disabled{opacity:.3;cursor:not-allowed}
.ifoot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px;color:var(--m)}
.cb{background:none;border:none;color:var(--m);cursor:pointer;font-size:10px;font-family:Arial}
#vs{display:none;font-size:10px;color:#ff4040;font-weight:700}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(122,184,64,.94);color:#fff;padding:8px 20px;border-radius:18px;font-size:13px;font-weight:700;z-index:9999;display:none;white-space:nowrap;pointer-events:none}
</style>
</head>

utine with personal life\n3. Delay in processing requests - leave, family permission, fund withdrawal\n4. Domestic reasons - loss of loved ones, legal/property disputes\n5. Demeaning tasks - loss of self-esteem\n6. Financial stressors - bad investments\n7. Severe medical ailment, depression, past history of attempted suicide\n\nWarning Signs (Appx A):\nFeelings: Hopeless, Helpless, Worthless, Guilt/shame/self-hatred, Sadness/anxiety/agitation, Anger/hostility/irritability, Confusion\nActions: Uncharacteristic aggression, Risk taking, Obtaining weapon, Withdrawal from friends, Becoming accident-prone, Unauth absence\nChanges: Personality changes, Increased alcohol/drugs, Loss of interest in appearance/hobbies/work, Sleep changes, Marked decrease in work performance\nThreats: Statements about death, Writing suicide note, Giving away possessions, Sub-lethal gestures/attempts\n\nRemedial Measures (Appx B):\nMarital Discord: Pre-marital counselling, encourage marriage after financial stability, expert counselling\nDenial of Leave: Ensure equity, deny only if op demands, sr mgt to explain reason\nDrug/Alcohol: Supply control, near zero tolerance, early referral, family counselling\nExcessive anger: Buddy system, mutual checks, monitoring, one-to-one interaction\nFinancial stressors: Fin discipline, edn on safe investment, discourage quick money habits, regulated PPF withdrawals\nLoss of self-esteem: Frequent interaction, voice concern, proactive team building\nRejection by girlfriend/broken engagement: Premarital counselling, role of counsellors/RT JCOs\nInability to express problems: Encourage horizontal/vertical conversation, open door policy, dedicated gp time\nDiscp/legal difficulty: Early expert help\nChange in orbat/Op role: Focused sp during pre-indn trg\n\nUnit Level Actions:\n1. Building Interpersonal Relationship (Offrs-Men interaction) - Back to Basics of Knowing Your Tps\n2. Unit Tarteeb - strict adherence: Sainik Sammelan, Roll Call, informal interaction, Games/Mandir Parade/Trg\n3. Role of Imdt Superiors & Peers - recognize suicidal tendencies early\n4. Buddy System - companionship, sharing info/thoughts, buddy pairs/triads thoughtfully formed\n5. Suicide Watch - discreetly place vulnerable indls\n6. Comn with Family Members - unit must have family contact details\n7. Public Humiliation and Emp on Demeaning Jobs - AVOID\n8. Encourage Pers to Seek Psy Asst - remove social stigma\n9. Rotation and Psy Screening of Tps at challenging loc\n10. Use of Crumple Jts in Fans - wt limit 45kg to prevent hanging\n\nAction by Cdrs:\n- Min Att of Pers to Higher Fmn HQs - reduce att pers\n- Emp of Psy Counselors - trained under DIPR/CH/MH/BH\n- Org Mental Wellbeing Camps/Seminars\n- All C of I into suicides must be put up to Army Cdr\n- Issued by Maj Gen Neeraj Gosain, ADG DV for AG\n\n=== AGNIVEER ASSESSMENT & SELECTION POLICY (B/33513/Assmt Policy/AG/PS-2(c) dt 08 Aug 2025) ===\nRef: MoD/DMA GSL No MoD/DMA/JS(M&DS)/2021/Agnipath 01 dt 15 Jun 2022\n\nBasic Framework:\n- Agnipath scheme: 4 years Terms of Engagement (ToE)\n- Performance evaluated through ASAAN (Army Software for Agnipath Administration and Networking)\n- Merit list: trade/arm/service/regiment/unit/gender wise\n- Specified percentage of Agniveers from each batch offered regular cadre\n\nEssential Criteria for Selection:\n8.1 Willingness/Unwillingness: Window from 180 days to 90 days prior to completion of ToE. Option exercised once - final. Change only before 1200h on date of completion of ToE (unforeseen circumstances only). Form at Appendix A.\n\n8.2 Medical Criteria:\n- Must be SHAPE-1 (as per Army Order 3/2001 and IHQ of MoD(Army) AG Branch DGMS(Army) letter No 76063/Policy/DGMS-5A dt 24 Jan 2024)\n- LMC (temporary): screened provisionally, must be fit SHAPE-1/F1 before completion\n- Permanent LMC: NOT eligible EXCEPT battle casualties\n- Battle Casualties with Presidential Gallantry Awards (Sena Medal Gallantry and above): eligible in min medical cat SHAPE-3/F2 (less Psy S factor)\n- Battle Casualties (other than Presidential Gallantry): min cat SHAPE-2/F2 (less Psy S factor)\n- Overweight Sportspersons (P-2/F2 T-24 or permanent) in Services/National sports team: eligible with CO certificate countersigned by Brigade Cdr (min), 90 days before ToE completion\n\n8.3 Discipline Criteria:\n- Court Martial or Civil Court conviction for offences in Appendix B: NOT eligible\n- Red Ink Entry (max 1): permitted, 20 marks deducted\n- Black Ink Entry (max 2): permitted, 10 marks deducted each\n- More than 1 red OR 2 black OR combination of 1 red + 1 black: INELIGIBLE\n- Offences permanently debarring (Appx B): Sec 34,35,36,37,38,40(a),41,42(a)(b),43,46(a),52(a)(b)(c)(d)(f),53,54(a),57(c)(d)(e),58(a),64(c),64(e),69 of Army Act\n- CBI/SPE/Civ/Vigilance inquiry: ban on enrolment (provisionally fit if absolved before ToE)\n\n8.5 Marital Status: Must not marry during 4-year engagement. If married - released from service. Only unmarried eligible for regular cadre as Sepoy. Women Agniveers: not to get pregnant during engagement; LMC due to pregnancy - released on admin grounds.\n\n9. Categories for Assured Enrolment and Additional Weightage:\n9.1 Gallantry Award Winners: Sena Medal (Gallantry) and above - assured enrolment; discharged after award also assured within 1 month; seniority protected with original batch; no back wages.\n\n9.2 Bonus Marks for Honours and Awards:\n- PVC & AC: Assured enrolment (if medical/discipline criteria met)\n- MVC & KC: Assured enrolment\n- VrC & SC: Assured enrolment\n- SM(G): Assured enrolment\n- M-in-D: 25 bonus marks\n- Distinguished Service Awards: 20 bonus marks\n- CDS/COAS Commendation Card & Equivalent: 15 bonus marks\n- VCOAS/GOC-in-C Commendation Card & Equivalent: 10 bonus marks\n\n9.3 Outstanding Sports Persons:\n- Participation in recognised international events: Assured enrolment\n- Medal at recognised national level events: Assured enrolment\n- Participation at National Level: 10 bonus marks\n- Participation at Services Level: 06 bonus marks\n(As per ASCB letter A/55038/Policy/GS/MT-8 dt 20 Oct 2018)\n\n10. Assessment System - Continuous Performance Evaluation System (CPES):\n- Based on: PPT, Firing, Drill; periodic assessment on operational & trade aptitude\n- Performance Data Sheet (PDS) - CONFIDENTIAL document (Appendix C)\n\n11. Assessment Phases:\n11.1 Phase I - Recruit Training (1st Year): BPET, PPT, Drill, Firing at training centre\n11.2 Phase II - Unit (2nd and 3rd Year): BPET, PPT, Drill, Firing + Op/Trade aptitude assessment\n11.3 Phase III - Unit (4th Year): Same as 2nd/3rd + Final Screening Board\n\n12. Weightages:\n- Operational & Trade Aptitude: 39%\n- Demonstrated Performance: 61% comprising:\n  - Screening Boards: 25%\n  - Drill: 6%\n  - Physical Fitness (BPET): 10%\n  - Physical Fitness (PPT): 10%\n  - Firing: 10%\n\n12.3 Yearly Breakdown:\nYear 1 (Training Centre): Op&Trade 3%, Screening 12%, Drill 2%, BPET 1%, PPT 1%, Firing 1%, Total 20%\nYear 2 (Unit): Op&Trade 12%, Drill 1%, BPET 3%, PPT 3%, Firing 3%, Total 22%\nYear 3 (Unit): Same as Year 2, Total 22%\nYear 4 (Unit): Op&Trade 12%, Screening 13%, Drill 2%, BPET 3%, PPT 3%, Firing 3%, Total 36%\nGrand Total: 39% + 25% + 6% + 10% + 10% + 10% = 100% (1000 marks)\n\n14.1 Screening Board Parameters:\n1st Year (Training Centre) - Total 120 marks:\n- Common Military Knowledge: 20\n- Basic Tactics: 40 (Written/Practical)\n- Trade Proficiency: 40\n- Weapon/Equipment Handling: 20\n\n4th Year (Unit) - Total 130 marks:\n- Same parameters with Weapon/Equipment Handling: 30\n\n14.2 Tests Each Year:\nDrill Parameters: Turnout & Bearing 20%, Word of Command 20%, Drill Square Test (DST) 60%\nDST includes: Marching, Slow March, Turnings, Saluting\n\nPhysical Fitness:\n- BPET: Battle Physical Efficiency Test (Appendix E)\n- PPT: Physical Proficiency Test (Appendix F)\n- All on rifle only\n\nOp & Trade Aptitude Assessment:\nLevel 1 Assessor (Individual Skills):\n- Handling of Trade Eqpt: 25\n- Comn Skills: 25\n- Wpn & Eqpt Maintenance: 25\n- Initiative & Drive: 25\n- Total: 100\n\nLevel 2 Assessor (Collective Functioning):\n- Op Orientation: 25\n- Team Spirit: 25\n- Op Deployment and Usage of Trade Eqpt: 25\n- Adaptability including ability to sustain stress: 25\n- Total: 100\n\nLevel 3 Assessor (Character & Organisational):\n- Dedication to Organisation: 25\n- Special Achievements: 25\n- Motivation, Courage & ability to sustain stress: 25\n- Dependability: 25\n- Total: 100\n\nGrading: Outstanding 20-25, Excellent 15-20, Good 10-15, Satisfactory 5-10, Poor 0-5\n\nPhysical Service (min under each assessor):\n- Level 1 Assessor: 90 days (60 days for recruits)\n- Level 2 Assessor: 45 days\n- Level 3 Assessor: 30 days\n\n15. Timelines for Assessment:\nYear 1 (Training Centre): On completion of training\nYear 2 (Unit): Upto last day of 18th month; PDS upload within 30 days\nYear 3 (Unit): Upto last day of 30th month; PDS upload within 30 days\nYear 4 (Unit): Upto last day of 42nd month; Screening Board: 180 to 90 days prior to ToE completion\n\n16. Frequency of Tests: Two opportunities for Drill, BPET, PPT, Firing each year. Best of two recorded.\n\n17. Waiver for HAA (above 9000 ft)/extreme conditions: Physical tests may be conducted 6 months in advance or 6 months later (less 4th year). Authority: min Brigadier rank for delay/advance. Max 2 such exemptions in 4 years. If exempt from PPT/BPET - average of other years extrapolated.\n\n18. LMC Agniveers: Tests upto 6 months later with Brigadier rank authority. Exceptional: max 1 year exemption with Maj Gen authority.\n\n19. Clean Break and Recall Mechanism:\n19.1 Final year screening results in PDS at least 90 days before ToE completion\n19.2 EMI/EMB: 150 to 60 days before ToE\n19.3 Merit list based on 1000 marks total. Negative marks for discipline, bonus for honours/sports.\n19.3.1 Separate merit list for every trade and gender within Arms/Services\n19.3.2 Assurance category candidates within specified vacancy\n19.3.3 Merit list levels: Regimented Arms - Soldier GD at unit level; Non-Regimented - all trades centrally controlled\n\nArms/Services for Regimented - Unit Level Trades:\n1. Infantry: Soldier GD; 2. Armoured Corps: Soldier GD (Trade wise); 3. Mechanised Infantry: Soldier GD (Trade wise); 4. Artillery: Soldier GD (Trade wise); 5. Army Air Defence: Soldier GD, Soldier Technical (Trade wise); 6. Engineers: Soldier GD (Trade wise)\n\nNon-Regimented Arms/Services (All trades centrally controlled):\nArmy Aviation, Signals, EME, ASC, AOC, AMC, ADC, AEC, INT, CMP, APTC, RVC, Pioneers\n\n19.4 Allotment of Vacancy: MP Directorate/AGs Br intimates all Records. Records work out vacancy at unit/bn level.\n19.5 Vetting and BOOs: BOO validates each year before PDS entry\n19.6 Record Offices: Order BOO for vetting, forward to Line Directorates through ASAAN 30 days before last Agniveer discharge\n19.7 Line Directorates: Vet data, endorse to AGs Branch through ASAAN within 3 days of last discharge\n19.8 AGs Branch: Compile consolidated list, forward to Rtg Directorate/Record Offices within 6 days\n19.9 Declassification: Within 7 days after last Agniveer discharge\n19.10 Enrolment into Regular Cadre: Guidelines by AG Branch subsequently\n\nChain of Command for Assessors:\nMajor Units - All Arms & Services:\n- Level 1: Training Platoon Cdr/Platoon Cdr/Troop Leader/Sr JCO or Equivalent JCO\n- Level 2: Training Company Cdr/Company Cdr/Battery Cdr/Squadron Cdr/Officer Commanding Workshop/Flight Cdr or Equivalent Officer\n- Level 3: Training Battalion Cdr/CO/Commandant or Equivalent Officer\n\nBFET Standards for Agniveer (MALES) - Appendix E:\nUpto 5000 Feet:\n- Excellent: 25 min (40 Marks); Good: 26 min 30 sec (30 Marks); Satisfactory: 28 min (20 Marks); Max: 40\n5000-9000 Feet:\n- Excellent: 28 min (40 Marks); Good: 29 min 30 sec (30 Marks); Satisfactory: 31 min (20 Marks)\n60 Meter Sprint: Excellent: 10 sec (20 Marks); Good: 11 sec (16 Marks); Satisfactory: 12 sec (12 Marks); Max: 20\n9 Feet Ditch: Pass; Max: 10\nHorizontal Rope: 9 Meters; Max: 20\nVertical Rope: 4 Meters; Max: 10\nTotal: 100\n\nBPET Standards for Agniveer (FEMALES) - Appendix E:\nUpto 5000 Feet: Excellent: 32 min (40); Good: 33 min 30 sec (30); Satisfactory: 35 min (20); Max: 40\n5000-9000 Feet: Excellent: 35 min (40); Good: 36 min 30 sec (30); Satisfactory: 38 min (20)\n60 Meter Sprint: Excellent: 16 sec (20); Good: 19 sec (16); Satisfactory: 20 sec (12); Max: 20\n6 Feet Ditch: Pass; Max: 10\nHorizontal Rope: 6 Meters; Max: 20\nVertical Rope: 3 Meters; Max: 10\nTotal: 100\n\nPPT for Recruit Agniveer (MALES):\nUpto 5000 Ft: Excellent 09 min (20); Good 09 min 30 sec (16); Satisfactory 10 min (12); Max: 20\n5000-9000 Ft: Excellent 10 min (20); Good 11 min (16); Satisfactory 12 min (12)\n100 Meter Sprint: Excellent 13 sec (20); Good 14 sec (16); Satisfactory 15 sec (12); Max: 20\nChin Ups: Excellent 10 (20); Good 8 (16); Satisfactory 6 (12); Max: 20\nSit Ups: Excellent 40 (10); Good 35 (08); Satisfactory 30 (06); Max: 10\nToe Touch: Excellent 08 (20); Good 07 (16); Satisfactory 06 (12); Max: 20\n5 Meter Shuttle: Excellent 17 (10); Good 16 (08); Satisfactory 15 (06); Max: 10\nTotal: 100\n\nPPT for Agniveer (MALES) - Unit:\nSame parameters but Sit Ups max 20, 5 Meter Shuttle max 20; Total: 100\n\nPPT for Recruit Agniveer (FEMALES):\nUpto 5000 Ft: Excellent 11 min 30 sec (30); Good 12 min 30 sec (24); Satisfactory 13 min 30 sec (18); Max: 30\n5000-9000 Ft: Excellent 12 min 30 sec (30); Good 13 min 30 sec (24); Satisfactory 14 min 30 sec (18)\n100 Meter Sprint: Excellent 16 sec (10); Good 18 sec (08); Satisfactory 20 sec (06); Max: 10\nSit Ups: Excellent 40 (20); Good 35 (16); Satisfactory 30 (12); Max: 20\nPush Ups: Excellent 20 (20); Good 15 (16); Satisfactory 10 (12); Max: 20\n5 Meter Shuttle: Excellent 15 (10); Good 14 (08); Satisfactory 13 (06); Max: 10\nCross Grip Heaving: Excellent 03 (10); Good 02 (08); Satisfactory 01 (06); Max: 10\nTotal: 100\n\nPPT for Agniveer (FEMALES) - Unit:\nUpto 5000 Ft: Excellent 11 min 30 sec (20); Good 12 min 30 sec (16); Satisfactory 13 min 30 sec (12); Max: 20\n100 Meter Sprint: Excellent 16 sec (20); Good 18 sec (16); Satisfactory 20 sec (12); Max: 20\nSit Ups: Max 20; Push Ups: Max 20; 5 Meter Shuttle: Max 20; Total: 100\n\nFiring Assessment at Training Centres (Appendix G):\nDay Firing:\n- 300m SFTS 04 rds S/S 45sec: Figure 11, 01 Pt per hit, Max 04\n- 200m SFTS 04 rds S/S 35sec: Figure 11, 03-02-01 (32-48-A), Max 12\n- 100m LU 10 rds Reflex: Figure 11, 01 Pt per hit, Max 10\n- 100m LU 04 rds S/S 30sec: Figure 11, 03-02-01 (24-32-A), Max 12\n- 50m SU 09 rds TRB/Controlled Burst 15sec: Figure 11, 01 Pt per hit, Max 09\nHours of Darkness:\n- 100m SFTS 04 rds S/S: Figure 11, 02 Pt per hit, Max 04\n- 15m BC 05 rds TRB: Figure 11, 01 Pt per hit, Max 05\nTotal: 56* (x factor 1.79 for 100 marks conversion)\n\nFiring Assessment at Units (Appendix H):\nDay Firing:\n- 100m LU 05 rds S/S 60sec: Figure 11, 03-02-01 (24-32-A), Max 15\n- 100m LS 03 rds S/S (Reflex): Figure 11, 02 Pt per hit, Max 06\n- 15m SU 06 rds TRB/Controlled Burst: Figure 11, 01 Pt per hit, Max 06\nHours of Darkness:\n- 100m SFTS 05 rds S/S 30sec: Figure 11, 01 Pt per hit, Max 05\nTotal: 32* (x factor 3.12 for 100 marks)\n\n=== AGNIVEER LEAVE RULES (MoD DMA GSL No 15(2)/2024-DMA(AG-II) dt 18 Sep 2024) ===\nApplicable to: Agniveers (including AgniveerVayu & AgniveerVayu Non-Combatants) in Tri-Services\nEffective from: 15 June 2022\n\nClassification of Leave:\n(a) Annual Leave\n(b) Sick Leave\n\nAnnual Leave:\n- 30 days per calendar year (1 Jan to 31 Dec)\n- NON-ACCUMULATIVE\n- Agniveer remains on strength of unit during leave\n- Can be extended to next calendar year at sanction authority discretion\n- First year: after completion of basic training (emergency/compassionate: during training also possible)\n- Can be clubbed with next year Annual Leave\n- Prefix/suffix holidays allowed\n- Can be taken in installments\n\nSick Leave:\n- On recommendation of Competent Medical Authority\n- Extension only by Competent Medical Board (must have reasonable prospect of recovery)\n- In ADDITION to annual leave entitlement\n\nEx-India Leave:\n- Within max entitled leave limit\n- Conditions: (a) Medical recommendation; (b) Recreation; (c) Vested interests overseas\n- Sanctioned by officer not less than Brigade/Sub Area Cdr (lower formations) or Director (Service HQ)\n- CORRIGENDUM (dt 03 Jun 2025): For Navy ships - Commanding Officer of Indian Navy Ship has same power\n\nGrant of Excess Leave for Journey:\n- If journey >2 days each way: additional leave to cover excess journey period\n- Admissible once per year\n- Applicable to Andaman/Nicobar, Lacadive, Minicoy, Amindivi Islands Agniveers also\n\nCarry Over: In compassionate cases - max 15 days from NEXT year entitlement\n\nLeave Commencement: When struck off duty (forenoon) or next day (afternoon relief)\nLeave Termination: Day preceding rejoining (if joins forenoon) or day of rejoining (if joins afternoon)\n\nLeave Sanctioning Authority: Commanding Officer/Officer Commanding Unit (or as mentioned in specific rules)\nClaim to Leave: NOT a right - always subject to exigencies of service\n\nPermission to Rejoin:\n- Annual leave: Cannot rejoin without permission from sanctioning authority\n- Sick leave: Must be declared fit by Competent Medical Authority THEN get permission\n\nOverstayal of Leave:\n- No pay for overstay period (unless extension granted)\n- Upto 15 days overstayal (beyond control, not own sickness): regularized by CO/OC against future leave\n- 15 to 30 days: regularized by HQ Commands\n- Beyond 30 days: under orders of Government\n\nRecall from Leave:\n- Return to duty immediately on recall orders\n- Travel time viewed as duty\n- Balance uavailed leave granted + additional travel leave given\n\nProvision for Sexual Harassment (Section 12 of SHWW Act 2013):\n- Women Agniveers: upto 90 days additional leave during inquiry\n- In addition to other leave entitlement\n\nRegularisation of Excess/Irregular Grant:\n- Upto 30 days excess (due to faulty documentation/misinterpretation): regularized by HQ Commands\n- Beyond 30 days: reported to Government\n\n=== DISABILITY EX-GRATIA FOR AGNIVEERS (No 12(1)/2022-DMA(AG-II) dt 20 Sep 2024) ===\nNO PENSION for Agniveers - only ONE-TIME EX-GRATIA\n\nDisability Ex-Gratia Rates:\n- 20% to 50% disability: Ex-gratia for 50% disability = Rs 15 Lakhs\n- More than 50% to 75%: Ex-gratia for 75% disability = Rs 25 Lakhs\n- More than 75% to 100%: Ex-gratia for 100% disability = Rs 44 Lakhs\n\nAdditional benefits:\n(b) Full pay for un-served period up to 4 years (with interest from discharge date) including Seva Nidhi\n(c) Balance accumulated in Agniveer Seva Nidhi fund including interest and Govt contribution from Agniveer Corpus Fund\n\nConditions for Grant:\n- Disability must be Attributable to or Aggravated by Bonafide Duty in Agnipath Scheme\n- If NOT attributable/aggravated: NO disability ex-gratia\n- Min disability: 20% for life\n- Causal connection between impairment/injury/disease and Bonafide Duty must be established\n\nInvalidation from Agnipath before 4 years: Treated as invalided from Agnipath Tenure\nInvalidation with disability caused by conditions of employment: eligible for ex-gratia if attributable\n\nMedical Test at Entry: Not exhaustive; may not detect hidden/latent/congenital conditions\nMere manifestation of disease during service does NOT establish attributability automatically\n\nAggravation: If disease onset hastened or worsened by specific Agnipath conditions (extreme climate, HAA, field, operations, deployments)\n\nAppellate Committee:\n1st Level: Chairperson Brigadier (PS) Indian Army & eqvt IN/IAF (for invalidated out - ADG(PS))\nMembers: Col AFMS Pensions, Col Pers Services, JAG Representative, IFA Representative\n\n2nd Level: Chairperson ADG (PS) Indian Army & eqvt IN/IAF (for invalidated out - DG MP&PS)\nMembers: Brig AFMS Pensions, Brig Pers Services, JAG Rep, IFA Rep\nAppeal within 6 months of rejection. If no consensus - referred to MoD for Raksha Rajya Mantri decision.\n\n=== MONETARY ENTITLEMENTS AT A GLANCE (Chapter XI) ===\n\nBattle Casualty (Fatal):\n(a) Liberalised/Special Family Pension: 100% Reckonable Emoluments for LFP; 60% for SFP\n(b) Death Gratuity:\n  - Less than 1 yr: 2x reckonable emoluments\n  - 1 yr to <5 yrs: 6x reckonable emoluments\n  - 5 yrs to <20 yrs: 12x reckonable emoluments (max Rs 20 Lakhs)\n  - 20 yrs and above: Half of reckonable emoluments for each completed 6 monthly period of qualifying service (including 5 yr weightage), max 33x, max Rs 20 Lakhs\n(c) Ex-Gratia from Central Govt: As per circumstances (Para 45)\n(d) State Ex-Gratia: As per State Policy (Appendix E)\n(e) Insurance from AGIF: Rs 50 Lakhs wef 01 Apr 2022\n(f) Maturity Amount from AGIF: As per contribution with compound interest\n(g) Final Settlement of Account: Balance of Pay & Allowances\n(h) AFPP Fund: As per subscription\n(i) Death Link Insurance with AFPP Fund: Rs 60,000/- if service >5 yrs and min stipulated balance\n(k) Leave Encashment: As per total days accumulated\n(l) Personal Accident Insurance linked with Defence Salary Account: Bank wise at Appendix Q\n(m) Funeral Allowance: Rs 9,000/-\n(n) AWWA Ex-Gratia: Rs 15,000/-\n(o) ACWF: Rs 8,00,000/-\n\nBattle Casualty (Non-Fatal):\n(a) War Injury Pension: Service Element 50% last pay + War Injury Element equal to reckonable emoluments for 100% disablement\n(b) Commutation: 50% of WIP\n(c) Retirement Gratuity: Total Emoluments x (Total Service + 5 yrs weightage)/2\n(d) Ex-Gratia from Central Govt: Rs 9 Lakh for 100% disablement, reduced proportionately (not below 20%)\n(e) State Ex-Gratia: As per State Policy (www.ksb.gov.in)\n(f) ACWF Ex-Gratia:\n  - Disabled soldiers boarded out prematurely in LMC before terms: Rs 8,00,000/-\n  - Disabled soldiers retained till completion: <60% disability Rs 4 Lakhs; 60% and above Rs 8 Lakhs\n(g) Maturity Amount AGIF: As per contribution compound interest\n(h) Final Settlement: Balance of Pay & Allowances\n(j) AFPP Fund: As per subscription\n(k) Leave Encashment: Days accumulated x one day salary including DA\n(l) AWWA Financial Grant for Sewing Machine: Rs 6,000/- for wives of serving personnel invalided out with 100% disability\n\nPhysical Casualties (Fatal) - same as Battle Casualty Fatal but:\n(m) Funeral Allowance: Rs 5,000/- from KSB\n(n) AWWA Ex-Gratia: Rs 15,000/-\n(o) ACWF: Rs 2,50,000/-\n\nDeath in Service Flow Chart:\n- Within D+3: Initial Report (within 24 hrs), Detailed Report, Detail spl courier to NoK\n- Within D+14: Publication of Death Pt II order\n- Within D+30: e-Insurance claim on ASAAN, Bank details/PAN of NoK, Prep Adjudication File, Post Mortem/Viscera Report, C of I proceedings, Financial implications, 4 days charter of duty, Processing AFMSF-7A(PC)\n- Within D+90: Processing fatal docs by unit to Records to Line Dte, Recom of CIC Records on cl of death cat, Recom of Head of Arms/Service HQ, Concurrence of PIFA, Sanction by AG (CFA), Cas CI - BC/PC by MP5D/AGs Br, Publication of Adjudication Pt II order by Records Office, Processing to CAPAO for disbursement\n\nAWWA Grant (D+3): Rs 30,000/- (HQ Comd AWWA)\nFuneral Allowance (D+3): Rs 9,000/- (Unit ACG)\n1st Tranche ABCWF: Rs 1,00,000/- (Rs 50,000 for rect) within D+3\n2nd Tranche ABCWF: Rs 1,50,000/- (PC), Rs 7,00,000/- (BC) within D+90\nDSP Acct Insurance: By Bank within D+30\nNon-contributory Insurance: Rs 48,00,000/- within D+30\n\n=== MEDICAL ENTITLEMENT CERTIFICATE (MEC) ===\nRef: DGMS-5B letter B/76782/Medical Entitlement/Ruling/DGMS-5B dt Oct 2023\n- MEC Version 2.0 - To be produced along with Aadhar Card\n- Validity: THREE (03) years from date of issue\n- Issued by officer not below rank of Colonel\n- No ink signed copies - original with indl/dependent (04 dependents = 04 MECs numbered 1/5, 2/5 etc)\n- Contains: Ser No, Relationship, Name, Age, Identification Marks, Aadhar Number\n- Certifies children and/or parents directly dependent on serving soldier\n\nEND OF ARMY DATABASE. Use above data for precise, accurate answers. Always cite the specific policy letter/AO number when answering.';

function fmt(r){
  r=r.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  r=r.replace(/[*][*](.+?)[*][*]/g,'<strong>$1</strong>');
  r=r.replace(/[*]([^*]+)[*]/g,'<em>$1</em>');
  r=r.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  r=r.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  r=r.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  r=r.replace(/^- (.+)$/gm,'<li>$1</li>');
  r=r.replace(/`([^`]+)`/g,'<code>$1</code>');
  r=r.split('\n').join('<br>');
  return r;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').split('\n').join('<br>');}
function plain(h){return h.replace(/<br[^>]*>/gi,'\n').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');}
function cpTxt(h){var p=plain(h);if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(p).then(function(){toast('Copied!');}).catch(function(){fbCp(p);});}else fbCp(p);}

function startVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice ke liye Chrome use karo');return;}
  if(listening){if(recog)recog.stop();return;}
  if(location.protocol!=='https:'&&location.hostname!=='localhost'){toast('Voice sirf faujiai.in par kaam karta hai');return;}
  try{
    recog=new SR();recog.lang='hi-IN';recog.interimResults=false;
    recog.onstart=function(){listening=true;document.getElementById('vbtn').classList.add('on');document.getElementById('vs').style.display='inline';};
    recog.onresult=function(e){var t=e.results[0][0].transcript;document.getElementById('mi').value=t;ar(document.getElementById('mi'));setTimeout(go,500);};
    recog.onerror=function(e){listening=false;document.getElementById('vbtn').classList.remove('on');document.getElementById('vs').style.display='none';if(e.error==='not-allowed')toast('Lock icon > Mic > Allow',5000);else toast('Voice error: '+e.error);};
    recog.onend=function(){listening=false;document.getElementById('vbtn').classList.remove('on');document.getElementById('vs').style.display='none';};
    recog.start();
  }catch(e){toast('Voice error: '+e.message);}
}

function calcDist(lat1,lon1,lat2,lon2){var R=6371,dL=(lat2-lat1)*Math.PI/180,dl=(lon2-lon1)*Math.PI/180,a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dl/2)*Math.sin(dl/2);return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);}

async function findNearby(query){
  mkTyp();
  if(!navigator.geolocation){rmTyp();makeMsg('a','Location access nahi mila.',null,null,null);return;}
  navigator.geolocation.getCurrentPosition(
    async function(pos){
      rmTyp();
      var lat=pos.coords.latitude,lon=pos.coords.longitude;
      showMap(query,lat,lon);
      try{
        var r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(query)+'&lat='+lat+'&lon='+lon+'&limit=5&format=json',{headers:{'User-Agent':'FaujiAI/4.0'}});
        var data=await r.json();
        if(data&&data.length>0){
          var txt='Najdeek '+query+':\n\n';
          data.slice(0,5).forEach(function(p,i){var dist=calcDist(lat,lon,parseFloat(p.lat),parseFloat(p.lon));txt+=(i+1)+'. '+p.display_name.split(',').slice(0,3).join(', ')+' ('+dist+' km)\n';});
          makeMsg('a',txt,null,null,txt);
        }else{makeMsg('a',query+' aapke paas nahi mila.',null,null,null);}
      }catch(ex){makeMsg('a','Search error.',null,null,null);}
    },
    function(){rmTyp();makeMsg('a','Location allow karo phir try karo.',null,null,null);},
    {timeout:10000}
  );
}

async function go(){
  var inp=document.getElementById('mi');
  var txt=inp.value.trim();
  if(!txt&&!pendImg)return;
  var btn=document.getElementById('sb');btn.disabled=true;
  var img=pendImg;
  makeMsg('u',txt,img,null,null);
  inp.value='';inp.style.height='auto';
  rmImg();
  var reply='',srcs=null;
  var sys=MODES[curMode]+'\n'+SYS;
  try{
    if(img){
      mkTyp();
      reply=await vQ(txt||'Analyze this document. Give summary and draft Army-format reply if letter.',img);
      rmTyp();makeMsg('a',reply,null,null,reply);
    }else if(isMap(txt)){
      findNearby(txt);
      reply='[Map shown]';
      hist.push({role:'user',content:txt});hist.push({role:'assistant',content:'Map dikhaya.'});
      btn.disabled=false;return;
    }else if(isI(txt)){
      mkTyp();
      var desc=txt;
      var imgWords=['image banao','photo banao','picture banao','tasveer','draw karo','image chahiye','photo chahiye','generate image','create image','poster banao','logo banao','wallpaper','sketch'];
      for(var iw=0;iw<imgWords.length;iw++){
        var re2=new RegExp(imgWords[iw],'gi');
        desc=desc.replace(re2,'');
      }
      desc=desc.trim()||txt;
      var style2='high quality detailed realistic 4k';
      var dl=desc.toLowerCase();
      if(dl.indexOf('army')>=0)style2='indian army military patriotic dramatic lighting';
      else if(dl.indexOf('cartoon')>=0)style2='cartoon colorful animated';
      else if(dl.indexOf('logo')>=0)style2='professional logo design clean vector minimal';
      else if(dl.indexOf('poster')>=0)style2='professional poster bold typography';
      var imgUrl='https://image.pollinations.ai/prompt/'+encodeURIComponent(desc+' '+style2)+'?width=512&height=512&nologo=true&seed='+Math.floor(Math.random()*99999);
      rmTyp();
      var bt2=document.getElementById('boot');if(bt2)bt2.remove();
      var c2=document.getElementById('chat');
      var dimg=document.createElement('div');dimg.className='msg a';
      var av2=document.createElement('div');av2.className='av';av2.textContent='FAI';
      var bw2=document.createElement('div');bw2.className='bw';
      var bub2=document.createElement('div');bub2.className='bub';
      var loadTxt=document.createElement('div');loadTxt.textContent='Image generate ho rahi hai...';
      var imgEl=document.createElement('img');
      imgEl.src=imgUrl;
      imgEl.style.cssText='max-width:100%;border-radius:10px;margin-top:8px;border:2px solid #d4a017;min-height:80px;display:block';
      imgEl.alt='Generated';
      imgEl.onload=function(){loadTxt.textContent='Image ready!';c2.scrollTop=c2.scrollHeight;};
      imgEl.onerror=function(){loadTxt.textContent='Image load nahi hui. Dobara try karo.';this.style.display='none';};
      var linkEl=document.createElement('a');
      linkEl.href=imgUrl;linkEl.target='_blank';linkEl.textContent='Full size dekho';linkEl.style.cssText='font-size:11px;color:#d4a017;display:block;margin-top:4px';
      var bt3=document.createElement('div');bt3.className='bt';bt3.textContent=nowT();
      bub2.appendChild(loadTxt);bub2.appendChild(imgEl);bub2.appendChild(linkEl);
      bw2.appendChild(bub2);bw2.appendChild(bt3);
      dimg.appendChild(av2);dimg.appendChild(bw2);
      c2.appendChild(dimg);c2.scrollTop=9999;
      reply='[Image: '+desc+']';
}else if(isN(txt)){
      mkTyp();
      var nd=await sNews(txt);
      var ctx='';
      if(nd.answer)ctx+='ANSWER: '+nd.answer+'\n';
      if(nd.results)nd.results.forEach(function(r2,i2){ctx+='['+(i2+1)+']: '+r2.title+'\n'+((r2.content||'').slice(0,400))+'\n';});
      var nMsgs=[{role:'system',content:'You are FAUJI AI. Use ONLY these live results. Reply in same language. Rewrite simple words with bullet points.'},{role:'user',content:ctx+'\nQuestion: '+txt}];
      rmTyp();
      var so=mkStream();
      try{reply=await gStream(nMsgs,function(p){so.bub.innerHTML=fmt(p);document.getElementById('chat').scrollTop=9999;});}catch(ex){try{reply=await cOR(nMsgs);}catch(ex2){reply=await cOR(nMsgs);}}
      if(nd.results)srcs=nd.results;
      endStream(so,reply,srcs,txt);
    }else{
      var msgs=[{role:'system',content:sys}].concat(hist.slice(-16)).concat([{role:'user',content:txt}]);
      var so2=mkStream();
      try{reply=await gStream(msgs,function(p){so2.bub.innerHTML=fmt(p);document.getElementById('chat').scrollTop=9999;});}catch(ex){try{reply=await cOR(msgs);}catch(ex2){reply=await cOR(msgs);}}
      endStream(so2,reply,null,txt);
    }
    hist.push({role:'user',content:txt||'[image]'});
    hist.push({role:'assistant',content:reply});
  }catch(err){
    rmTyp();
    // Auto-retry once silently before showing error
    try{
      var retryMsgs=[{role:'system',content:MODES[curMode]+'\n'+SYS}].concat(hist.slice(-10)).concat([{role:'user',content:txt||'[image]'}]);
      var retryReply=await cOR(retryMsgs);
      if(retryReply){makeMsg('a',retryReply,null,null,retryReply);hist.push({role:'user',content:txt||'[image]'});hist.push({role:'assistant',content:retryReply});btn.disabled=false;return;}
    }catch(retryErr){}
    var ce=document.getElementById('chat');
    var de=document.createElement('div');de.className='msg a';
    var ave=document.createElement('div');ave.className='av';ave.style.color='#cc2200';ave.textContent='ERR';
    var bwe=document.createElement('div');bwe.className='bw';
    var bube=document.createElement('div');bube.className='bub err';bube.textContent='Thoda ruko aur dobara try karo. ('+err.message+')';
    bwe.appendChild(bube);de.appendChild(ave);de.appendChild(bwe);ce.appendChild(de);
  }
  btn.disabled=false;
  document.getElementById('chat').scrollTop=9999;
}
